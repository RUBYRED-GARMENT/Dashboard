<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>RUBYRED Pro Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Roboto+Mono:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #07080d; --surface: #0e1018; --surface2: #151720;
  --border: rgba(255,255,255,0.06); --text: #e8eaf2; --muted: #8285a0;
  --accent: #6c63ff; --radius: 16px; --grid: rgba(255,255,255,0.03);
}

body.light-mode {
  --bg: #f4f7fa; --surface: #ffffff; --surface2: #fcfcfd;
  --border: rgba(0,0,0,0.08); --text: #1a1d23; --muted: #64748b;
  --accent: #4f46e5; --grid: rgba(0,0,0,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; flex-wrap: wrap; }
.page-title { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }

.theme-toggle {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600;
}

/* ── Daily Report Nav Button ── */
.daily-nav-btn {
    background: linear-gradient(135deg, #f3524a 0%, #ff8c40 100%);
    color: #fff; border: none;
    padding: 10px 18px; border-radius: 10px; cursor: pointer;
    font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 14px rgba(243,82,74,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.3px;
}
.daily-nav-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(243,82,74,0.45); }
.daily-nav-btn:active { transform: translateY(0); }

.filter-select {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    padding: 10px 15px; border-radius: 10px; font-weight: 600; cursor: pointer; outline: none;
}

.sec-title { font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin: 25px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 5px; font-weight: 700; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
.kpi-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-family: 'Inter', sans-serif; }
.kpi-val { 
    font-family: 'Roboto Mono', monospace;
    font-size: 26px; font-weight: 700; color: var(--c); 
}

.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
.chart-container { position: relative; min-height: 320px; }

.checklist { flex: 1; min-width: 250px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 250px; overflow-y: auto; padding-right: 10px; }
.check-item { display: flex; align-items: center; gap: 8px; font-size: 12px; cursor: pointer; background: var(--surface2); padding: 8px; border-radius: 8px; border: 1px solid var(--border); }

.hidden { display: none !important; }

/* ─── Ratio Section Styles ─── */
.ratio-checklist {
    flex: 1; min-width: 250px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; max-height: 280px; overflow-y: auto; padding-right: 6px;
}
.ratio-check-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; cursor: pointer;
    background: var(--surface2); padding: 9px 10px;
    border-radius: 8px; border: 1px solid var(--border);
    transition: border-color 0.2s, background 0.2s;
    position: relative;
}
.ratio-check-item:hover { border-color: var(--accent); }
.ratio-check-item.is-base {
    border-color: #f3524a;
    background: rgba(243, 82, 74, 0.08);
}
.ratio-check-item.is-base .base-badge { display: inline-block; }
.base-badge {
    display: none;
    font-size: 9px; font-weight: 800;
    background: #f3524a; color: #fff;
    padding: 1px 5px; border-radius: 4px;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-left: auto;
}
.ratio-hint {
    font-size: 11px; color: var(--muted);
    margin-bottom: 12px; font-family: 'Inter', sans-serif;
    padding: 8px 12px; background: var(--surface2);
    border-radius: 8px; border: 1px solid var(--border);
    line-height: 1.5;
}
.ratio-stats { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
.ratio-stat-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; font-family: 'Roboto Mono', monospace;
    padding: 6px 10px; border-radius: 7px;
    background: var(--surface2); border: 1px solid var(--border);
}
.ratio-stat-label { color: var(--muted); font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600; }
.ratio-stat-val { font-weight: 700; }

/* ─── Daily Report Section ─── */
#dailyReportSection {
    scroll-margin-top: 20px;
}

.daily-report-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
}

.daily-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 4px 12px -2px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
}
.daily-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px -4px rgba(0,0,0,0.25);
    border-color: var(--dc);
}
.daily-card.expanded {
    border-color: var(--dc);
    box-shadow: 0 8px 28px -4px rgba(0,0,0,0.3);
}

.daily-card-header {
    padding: 16px 18px 14px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s;
}
.daily-card.expanded .daily-card-header {
    border-bottom-color: var(--border);
}

.daily-card-left { display: flex; flex-direction: column; gap: 4px; }

.daily-card-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    background: color-mix(in srgb, var(--dc) 15%, transparent);
    color: var(--dc);
    margin-bottom: 8px;
    flex-shrink: 0;
}

.daily-card-label {
    font-size: 10px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    font-family: 'Inter', sans-serif; letter-spacing: 1px;
}
.daily-card-value {
    font-family: 'Roboto Mono', monospace;
    font-size: 32px; font-weight: 700;
    color: var(--dc);
    line-height: 1;
}

.daily-card-toggle {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--muted);
    flex-shrink: 0;
    transition: background 0.2s, transform 0.3s;
}
.daily-card.expanded .daily-card-toggle {
    background: color-mix(in srgb, var(--dc) 15%, transparent);
    color: var(--dc);
    transform: rotate(180deg);
}

/* Expandable details panel */
.daily-card-details {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s;
    padding: 0 18px;
}
.daily-card.expanded .daily-card-details {
    max-height: 400px;
    padding: 14px 18px 16px;
}

.detail-empty {
    font-size: 12px; color: var(--muted);
    font-family: 'Inter', sans-serif;
    text-align: center; padding: 8px 0;
    font-style: italic;
}

.detail-item-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12.5px; color: var(--text);
    font-family: 'DM Sans', sans-serif;
}
.detail-item-row:last-child { border-bottom: none; }
.detail-item-row::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--dc);
    flex-shrink: 0;
}

/* ── Chart area below cards ── */
.daily-chart-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
@media (max-width: 700px) {
    .daily-chart-wrap { grid-template-columns: 1fr; }
}
.daily-chart-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}
.daily-chart-title {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.2px;
    font-family: 'Inter', sans-serif;
    margin-bottom: 14px;
}
/* ─────────────────────────── */

@media (max-width: 768px) {
    .chart-container { min-height: 500px; }
}
</style>

</head>

<script>
const SHEET_ID = '1j7IFj_tylNeqwui57JU7coeB6XXj0Lt7d4yBHaqmutE';
const API_KEY  = 'AIzaSyB_dCi6NlG_jUCUY955eynfN0gF7KobQ4A';
// Expand range to row 20 to capture details rows 9-20
const RANGE    = 'recruitment!A1:ZZ20';

const colors = ['#6c63ff', '#0fd493', '#f3524a', '#4594f5', '#f065b8', '#ff8c40', '#f0c040', '#a78bfa', '#00d2ff', '#fbbf24', '#f87171'];

// Colors: Total=purple, Accepted=green, Rejected=orange-red, Hold=blue, Start=emerald-green, Left=red
const dailyCardColors = ['#6c63ff', '#0fd493', '#ff8c40', '#4594f5', '#10b981', '#f3524a'];
// Icons per position: Total, Accepted, Rejected, On Hold, Start, Left
const dailyIcons = [
    'fa-users',            // Total Interviews
    'fa-circle-check',     // Accepted
    'fa-ban',              // Rejected
    'fa-hourglass-half',   // On Hold
    'fa-rocket',           // Start
    'fa-door-open'         // Left
];

let charts = {}, pieChart = null, ratioPieChart = null, masterData = [];
let dailyBarChart = null, dailyDonutChart = null;

function toggleTheme() {
    const body = document.body;
    const icon = document.getElementById('themeIcon');
    body.classList.toggle('light-mode');
    if(body.classList.contains('light-mode')) {
        icon.classList.replace('fa-sun', 'fa-moon');
    } else {
        icon.classList.replace('fa-moon', 'fa-sun');
    }
    fetchData();
}

async function fetchData() {
    try {
        const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`);
        const data = await res.json();
        if (data.values) processData(data.values);
    } catch (e) { console.error("Error loading data"); }
}

function processData(rows) {
    const row1 = rows[0] || [], row2 = rows[1] || [], row4 = rows[3] || [], row5 = rows[4] || [];
    // Daily report rows: row7=index6 (names), row8=index7 (values), row9-20=index8-19 (details)
    const row7  = rows[6]  || [];   // card titles
    const row8  = rows[7]  || [];   // card values
    const detailRows = rows.slice(8, 20); // rows 9–20

    masterData = [];
    renderOverview(row4, row5);
    renderDetails(row1, row2);
    fillChecklist();
    fillRatioChecklist();
    renderDailyReport(row7, row8, detailRows);
}

function renderOverview(labels, values) {
    const kpis = document.getElementById('overviewKpiContainer');
    const chartsBox = document.getElementById('overviewChartContainer');
    kpis.innerHTML = ''; chartsBox.innerHTML = '';
    labels.forEach((l, i) => {
        kpis.innerHTML += `<div class="kpi-card" style="--c:${colors[i%11]}"><div class="kpi-label">${l}</div><div class="kpi-val">${values[i]||0}</div></div>`;
        masterData.push({ label: l, value: parseFloat(values[i]) || 0 });
    });
    chartsBox.innerHTML = `<div class="chart-card" style="grid-column: 1 / -1"><div class="chart-container"><canvas id="canvas_overview"></canvas></div></div>`;
    renderMainChart('canvas_overview', labels, values, colors.slice(0, labels.length));
}

function renderMainChart(canvasId, labels, data, bg) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    if(charts[canvasId]) charts[canvasId].destroy();
    const isMobile = window.innerWidth <= 768;
    const textColor = getComputedStyle(document.body).getPropertyValue('--muted').trim();
    const gridColor = getComputedStyle(document.body).getPropertyValue('--grid').trim();

    charts[canvasId] = new Chart(ctx, {
        type: 'bar', plugins: [ChartDataLabels],
        data: { labels: labels, datasets: [{ data: data, backgroundColor: bg, borderRadius: 6, barThickness: isMobile ? 20 : 40 }] },
        options: {
            indexAxis: isMobile ? 'y' : 'x', responsive: true, maintainAspectRatio: false,
            layout: { padding: { right: 35, top: 25, bottom: 10, left: 10 } },
            plugins: {
                legend: { display: false },
                datalabels: { 
                    anchor: 'end', align: 'end', color: getComputedStyle(document.body).getPropertyValue('--text').trim(), 
                    offset: 4, font: { family: 'Roboto Mono', weight: '700', size: 11 } 
                }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor, font: { family: 'Roboto Mono', size: 10 } } },
                x: { grid: { color: gridColor }, ticks: { color: textColor, font: { family: 'Inter', weight: '600', size: 10 } } }
            }
        }
    });
}

function renderDetails(labels, values) {
    const kpis = document.getElementById('detailedKpiContainer'), chartsBox = document.getElementById('detailedChartsContainer'), dropdown = document.getElementById('filterDropdown');
    dropdown.innerHTML = '<option value="all">All Views</option><option value="overview">Overview Only</option>';
    kpis.innerHTML = ''; chartsBox.innerHTML = '';
    for (let i = 0; i < labels.length; i += 3) {
        const gLabels = labels.slice(i, i + 3), gValues = values.slice(i, i + 3);
        const groupName = gLabels[0].split(' ')[0], groupID = `group_${groupName.toLowerCase()}_${i}`;
        dropdown.innerHTML += `<option value="${groupID}">${groupName}</option>`;
        gLabels.forEach((lbl, idx) => {
            kpis.innerHTML += `<div class="kpi-card detail-item ${groupID}" style="--c:${colors[(i+idx)%11]}"><div class="kpi-label">${lbl}</div><div class="kpi-val">${gValues[idx]||0}</div></div>`;
            masterData.push({ label: lbl, value: parseFloat(gValues[idx]) || 0 });
        });
        chartsBox.innerHTML += `<div class="chart-card detail-chart" id="card_${groupID}"><div class="chart-container"><canvas id="canvas_${groupID}"></canvas></div></div>`;
        setTimeout(() => renderSimpleChart(`canvas_${groupID}`, gLabels, gValues, colors.slice(i%11, (i%11)+3)), 150);
    }
}

function renderSimpleChart(canvasId, labels, data, bg) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    const gridColor = getComputedStyle(document.body).getPropertyValue('--grid').trim();
    if(charts[canvasId]) charts[canvasId].destroy();
    charts[canvasId] = new Chart(ctx, {
        type: 'bar', plugins: [ChartDataLabels],
        data: { labels: labels, datasets: [{ data: data, backgroundColor: bg, borderRadius: 6, barThickness: 35 }] },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { 
                legend: { display: false }, 
                datalabels: { anchor: 'end', align: 'end', color: getComputedStyle(document.body).getPropertyValue('--text').trim(), font: { family: 'Roboto Mono', weight: '700', size: 11 } } 
            },
            scales: {
                y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: '#8285a0', font: { family: 'Roboto Mono', size: 10 } } },
                x: { grid: { display: false }, ticks: { color: '#8285a0', font: { family: 'Inter', weight: '600', size: 10 } } }
            }
        }
    });
}

function fillChecklist() {
    const list = document.getElementById('compareChecklist');
    list.innerHTML = masterData.map((d, i) => `<label class="check-item"><input type="checkbox" value="${i}" onchange="updatePie()"> <span>${d.label}</span></label>`).join('');
}

function filterChecklist() {
    const q = document.getElementById('compSearch').value.toLowerCase();
    document.querySelectorAll('.check-item').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
}

function updatePie() {
    const checked = Array.from(document.querySelectorAll('#compareChecklist input:checked')).map(el => el.value);
    const ctx = document.getElementById('comparisonPieChart').getContext('2d');
    if (checked.length === 0) { if(pieChart) pieChart.destroy(); return; }
    if (pieChart) pieChart.destroy();
    pieChart = new Chart(ctx, {
        type: 'doughnut', plugins: [ChartDataLabels],
        data: { labels: checked.map(i => masterData[i].label), datasets: [{ data: checked.map(i => masterData[i].value), backgroundColor: checked.map(i => colors[i % 11]) }] },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { 
                legend: { position: 'bottom', labels: { color: '#8285a0', font: { family: 'Inter', size: 10 } } }, 
                datalabels: { color: '#fff', font: { family: 'Roboto Mono', weight: '700' }, formatter: (v, c) => ((v * 100) / c.chart.data.datasets[0].data.reduce((a, b) => a + b, 0)).toFixed(1) + "%" } 
            }
        }
    });
}

function applyFilter(val) {
    const ov = document.getElementById('overviewSection'), det = document.getElementById('detailedSection');
    if (val === 'overview') { ov.classList.remove('hidden'); det.classList.add('hidden'); }
    else if (val === 'all') { ov.classList.remove('hidden'); det.classList.remove('hidden'); document.querySelectorAll('.detail-item, .detail-chart').forEach(e => e.classList.remove('hidden')); }
    else { ov.classList.add('hidden'); det.classList.remove('hidden'); document.querySelectorAll('.detail-item').forEach(e => e.classList.toggle('hidden', !e.classList.contains(val))); document.querySelectorAll('.detail-chart').forEach(e => e.classList.toggle('hidden', e.id !== `card_${val}`)); }
}

// ─── Ratio Analysis Functions ──────────────────────────────────────────────

function fillRatioChecklist() {
    const list = document.getElementById('ratioChecklist');
    list.innerHTML = masterData.map((d, i) =>
        `<label class="ratio-check-item" id="ratioItem_${i}">
            <input type="checkbox" value="${i}" onchange="updateRatioPie()">
            <span style="flex:1;">${d.label}</span>
            <span class="base-badge">BASE</span>
        </label>`
    ).join('');
}

function filterRatioChecklist() {
    const q = document.getElementById('ratioSearch').value.toLowerCase();
    document.querySelectorAll('#ratioChecklist .ratio-check-item').forEach(el => {
        el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
    });
}

function updateRatioPie() {
    const checkedInputs = Array.from(document.querySelectorAll('#ratioChecklist input:checked'));
    const placeholder   = document.getElementById('ratioPiePlaceholder');
    const statsBox      = document.getElementById('ratioStats');
    const ctx           = document.getElementById('ratioPieChart').getContext('2d');

    document.querySelectorAll('#ratioChecklist .ratio-check-item').forEach(el => el.classList.remove('is-base'));

    if (checkedInputs.length === 0) {
        if (ratioPieChart) { ratioPieChart.destroy(); ratioPieChart = null; }
        placeholder.style.display = 'flex';
        statsBox.style.display = 'none';
        return;
    }

    const baseIdx   = parseInt(checkedInputs[0].value);
    const baseItem  = masterData[baseIdx];
    const baseValue = baseItem.value;

    document.getElementById(`ratioItem_${baseIdx}`).classList.add('is-base');

    const subItems = checkedInputs.slice(1).map(inp => masterData[parseInt(inp.value)]);

    const pieLabels = [], pieValues = [], pieColors = [];
    let sumOfParts  = 0;

    subItems.forEach((item, idx) => {
        pieLabels.push(item.label);
        pieValues.push(item.value);
        pieColors.push(colors[(idx + 1) % 11]);
        sumOfParts += item.value;
    });

    const remaining = baseValue - sumOfParts;
    if (subItems.length > 0 && remaining > 0) {
        pieLabels.push('Remaining');
        pieValues.push(remaining);
        pieColors.push('rgba(130,133,160,0.35)');
    }

    placeholder.style.display = 'none';
    if (ratioPieChart) { ratioPieChart.destroy(); ratioPieChart = null; }

    if (subItems.length === 0) {
        placeholder.style.display = 'flex';
        placeholder.innerHTML = `
            <i class="fa-solid fa-hand-pointer" style="font-size:28px; opacity:0.25;"></i>
            <span style="font-size:12px;">اختر عناصر إضافية لمقارنتها بـ <strong>${baseItem.label}</strong></span>`;
        statsBox.style.display = 'none';
        return;
    }

    ratioPieChart = new Chart(ctx, {
        type: 'doughnut', plugins: [ChartDataLabels],
        data: { labels: pieLabels, datasets: [{ data: pieValues, backgroundColor: pieColors, borderWidth: 2, borderColor: 'var(--surface)' }] },
        options: {
            responsive: true, maintainAspectRatio: false, cutout: '52%',
            plugins: {
                legend: { position: 'bottom', labels: { color: '#8285a0', font: { family: 'Inter', size: 10 }, padding: 12, usePointStyle: true } },
                datalabels: {
                    color: '#fff', font: { family: 'Roboto Mono', weight: '700', size: 11 },
                    formatter: (v) => { if (baseValue === 0) return '0%'; return ((v / baseValue) * 100).toFixed(1) + '%'; },
                    display: (ctx) => { const v = ctx.dataset.data[ctx.dataIndex]; return baseValue > 0 && (v / baseValue) >= 0.03; }
                },
                tooltip: { callbacks: { label: (ctx) => { const v = ctx.parsed; const pct = baseValue > 0 ? ((v / baseValue) * 100).toFixed(1) : 0; return ` ${ctx.label}: ${v.toLocaleString()} (${pct}% of ${baseItem.label})`; } } }
            }
        }
    });

    let statsHTML = `<div class="ratio-stat-row"><span class="ratio-stat-label" style="color:#f3524a;">⬤ ${baseItem.label} (BASE)</span><span class="ratio-stat-val" style="color:#f3524a;">${baseValue.toLocaleString()}</span></div>`;
    subItems.forEach((item, idx) => {
        const pct = baseValue > 0 ? ((item.value / baseValue) * 100).toFixed(1) : 0;
        statsHTML += `<div class="ratio-stat-row"><span class="ratio-stat-label" style="color:${colors[(idx+1)%11]}">⬤ ${item.label}</span><span class="ratio-stat-val">${item.value.toLocaleString()} &nbsp;<span style="color:${colors[(idx+1)%11]}; font-size:11px;">${pct}%</span></span></div>`;
    });
    if (remaining > 0) {
        const remPct = ((remaining / baseValue) * 100).toFixed(1);
        statsHTML += `<div class="ratio-stat-row"><span class="ratio-stat-label">⬤ Remaining</span><span class="ratio-stat-val">${remaining.toLocaleString()} &nbsp;<span style="color:var(--muted); font-size:11px;">${remPct}%</span></span></div>`;
    }
    statsBox.innerHTML  = statsHTML;
    statsBox.style.display = 'flex';
}

// ─── Daily Report Functions ────────────────────────────────────────────────

function renderDailyReport(nameRow, valueRow, detailRows) {
    const container = document.getElementById('dailyCardsContainer');
    container.innerHTML = '';

    // Filter out empty columns
    const cardCount = nameRow.filter(n => n && n.trim() !== '').length;
    if (cardCount === 0) return;

    const cardNames  = nameRow.slice(0, cardCount);
    const cardValues = valueRow.slice(0, cardCount);

    // Build details per column: collect non-empty cells from detailRows for each col index
    const detailsPerCard = cardNames.map((_, colIdx) => {
        return detailRows
            .map(row => (row[colIdx] || '').trim())
            .filter(cell => cell !== '');
    });

    // Build cards HTML
    cardNames.forEach((name, i) => {
        const color = dailyCardColors[i] || dailyCardColors[dailyCardColors.length - 1];
        const icon  = dailyIcons[i] || 'fa-circle-dot';
        const val   = cardValues[i] || '0';
        const details = detailsPerCard[i];

        const detailsHTML = details.length
            ? details.map(d => `<div class="detail-item-row">${d}</div>`).join('')
            : `<div class="detail-empty">No details available</div>`;

        container.innerHTML += `
            <div class="daily-card" id="dcard_${i}" style="--dc:${color};" onclick="toggleDailyCard(${i})">
                <div class="daily-card-header">
                    <div class="daily-card-left">
                        <div class="daily-card-icon">
                            <i class="fa-solid ${icon}"></i>
                        </div>
                        <div class="daily-card-label">${name}</div>
                        <div class="daily-card-value">${val}</div>
                    </div>
                    <div class="daily-card-toggle">
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                </div>
                <div class="daily-card-details" id="ddetails_${i}">
                    ${detailsHTML}
                </div>
            </div>`;
    });

    // Render charts
    renderDailyCharts(cardNames, cardValues.map(v => parseFloat(v) || 0));
}

function toggleDailyCard(idx) {
    const card = document.getElementById(`dcard_${idx}`);
    card.classList.toggle('expanded');
}

function renderDailyCharts(labels, values) {
    const textColor = getComputedStyle(document.body).getPropertyValue('--muted').trim();
    const gridColor = getComputedStyle(document.body).getPropertyValue('--grid').trim();
    const textFull  = getComputedStyle(document.body).getPropertyValue('--text').trim();
    const bgColors  = labels.map((_, i) => dailyCardColors[i] || dailyCardColors[dailyCardColors.length - 1]);

    if (dailyBarChart)   { dailyBarChart.destroy();   dailyBarChart   = null; }
    if (dailyDonutChart) { dailyDonutChart.destroy(); dailyDonutChart = null; }

    // ── Bar chart: all cards ──────────────────────────────────────────────
    const barCtx = document.getElementById('dailyBarChart').getContext('2d');
    dailyBarChart = new Chart(barCtx, {
        type: 'bar', plugins: [ChartDataLabels],
        data: { labels, datasets: [{ data: values, backgroundColor: bgColors, borderRadius: 8, barThickness: 32 }] },
        options: {
            responsive: true, maintainAspectRatio: false,
            layout: { padding: { top: 22, right: 12 } },
            plugins: {
                legend: { display: false },
                datalabels: { anchor: 'end', align: 'end', color: textFull, font: { family: 'Roboto Mono', weight: '700', size: 11 }, offset: 2 }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor, font: { family: 'Roboto Mono', size: 10 } } },
                x: { grid: { display: false }, ticks: { color: textColor, font: { family: 'Inter', weight: '600', size: 10 } } }
            }
        }
    });

    // ── Donut chart: cards 2,3,4 (index 1,2,3) as % of card 1 (index 0 = Total) ──
    const totalValue = values[0] || 0;

    // Take cards at index 1, 2, 3 (skip index 0 = Total)
    const donutSlices = labels.slice(1, 4);
    const donutValues = values.slice(1, 4);
    const donutColors = bgColors.slice(1, 4);

    // Add "Remaining" slice for the unaccounted portion
    const sumSlices  = donutValues.reduce((a, b) => a + b, 0);
    const remaining  = Math.max(0, totalValue - sumSlices);
    if (remaining > 0) {
        donutSlices.push('Remaining');
        donutValues.push(remaining);
        donutColors.push('rgba(130,133,160,0.25)');
    }

    const donutCtx = document.getElementById('dailyDonutChart').getContext('2d');
    dailyDonutChart = new Chart(donutCtx, {
        type: 'doughnut', plugins: [ChartDataLabels],
        data: {
            labels: donutSlices,
            datasets: [{
                data: donutValues,
                backgroundColor: donutColors,
                borderWidth: 2,
                borderColor: 'var(--surface)',
                hoverOffset: 6
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false, cutout: '58%',
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { color: textColor, font: { family: 'Inter', size: 10 }, padding: 10, usePointStyle: true }
                },
                datalabels: {
                    color: '#fff',
                    font: { family: 'Roboto Mono', weight: '700', size: 11 },
                    formatter: (v) => {
                        if (totalValue === 0) return '';
                        const pct = ((v / totalValue) * 100).toFixed(1);
                        return parseFloat(pct) >= 4 ? pct + '%' : '';
                    }
                },
                tooltip: {
                    callbacks: {
                        label: (ctx) => {
                            const v = ctx.parsed;
                            const pct = totalValue > 0 ? ((v / totalValue) * 100).toFixed(1) : 0;
                            return ` ${ctx.label}: ${v} (${pct}% of ${labels[0] || 'Total'})`;
                        }
                    }
                }
            }
        }
    });

    // Center label showing Total number
    // (drawn via plugin below)
    dailyDonutChart._totalLabel = `${totalValue}`;
    dailyDonutChart._totalCaption = labels[0] || 'Total';
}

// ─────────────────────────────────────────────────────────────────────────

window.addEventListener('resize', fetchData);
fetchData();
